---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: declarative-auth-openshift
  namespace: stackrox
type: Opaque
stringData:
  auth-provider.yaml: |
    name: OpenShift OIDC
    minimumRole: None
    uiEndpoint: central-stackrox.apps.cluster.example.com
    groups:
      - key: groups
        value: system:cluster-admins
        role: Admin
    oidc:
      issuer: https://oauth-openshift.apps.cluster.example.com
      mode: auto
      clientID: rhacs-oidc
      clientSecret: CHANGEME-replace-with-random-secret
