---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app: compliance
  name: compliance
  namespace: openshift-gitops
spec:
  destination:
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: gitops-compliance
    repoURL: https://github.com/alvarolop/ocp-rhacs
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions: []
